services:
  qwen-engine:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./server:/app/server
    environment:
      - BASE_MODEL=Qwen/Qwen2.5-7B-Instruct
      - DEVICE=auto
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
